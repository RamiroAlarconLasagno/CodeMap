# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

jobs:
  # -----------------------------------------------------------------------
  # Backend Python
  # -----------------------------------------------------------------------
  test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Ejecutar tests
        run: pytest tests/ -v --tb=short

      - name: Resumen
        if: always()
        run: echo "Tests Python completados para commit ${{ github.sha }}"

  # -----------------------------------------------------------------------
  # Frontend — tests de contratos de API (client.js)
  # Corre en todo push para detectar URLs rotas rapidamente
  # -----------------------------------------------------------------------
  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Ejecutar tests (contratos de endpoints)
        working-directory: frontend
        run: npm test

  # -----------------------------------------------------------------------
  # Frontend — build de produccion
  # Solo en main y PRs a main para no bloquear branches de desarrollo
  # -----------------------------------------------------------------------
  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Build de produccion
        working-directory: frontend
        run: npm run build

      - name: Verificar que dist/ fue generado
        run: test -d frontend/dist && echo "dist OK" || exit 1